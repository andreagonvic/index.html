<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquetipo de Innovación Hospitalaria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0608;
    --surface: #130a0b;
    --border: #2d1518;
    --accent: #F48941;
    --accent2: #A50D00;
    --text: #f0e8e6;
    --muted: #8a6f6a;
    --gold: #f5c842;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; top:-40%; left:-20%; width:80vw; height:80vw;
    background:radial-gradient(circle,rgba(244,137,65,0.06) 0%,transparent 65%); pointer-events:none;
  }
  body::after {
    content:''; position:fixed; bottom:-30%; right:-10%; width:60vw; height:60vw;
    background:radial-gradient(circle,rgba(165,13,0,0.07) 0%,transparent 65%); pointer-events:none;
  }
  .shell { width:100%; max-width:720px; position:relative; z-index:1; }

  /* HEADER */
  .header { text-align:center; margin-bottom:48px; animation:fadeUp .7s ease both; }
  .hero-img-wrap { display:flex; justify-content:center; margin-bottom:-8px; }
  .hero-img-wrap img { width:210px; height:210px; object-fit:contain; mix-blend-mode:screen; filter:saturate(1.1) brightness(1.05); pointer-events:none; }
  .eyebrow { font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; font-weight:500; }
  .header h1 { font-family:'Playfair Display',serif; font-size:clamp(28px,5vw,44px); font-weight:900; line-height:1.1; color:#fff; margin-bottom:16px; }
  .header h1 span { color:var(--accent); }
  .header p { color:var(--muted); font-size:15px; line-height:1.65; max-width:480px; margin:0 auto; }

  /* PROGRESS */
  .progress-wrap { margin-bottom:36px; animation:fadeUp .7s .1s ease both; }
  .progress-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
  .progress-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }

  /* CARD */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:40px; animation:fadeUp .6s .15s ease both; position:relative; overflow:hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:.7; }

  /* ID */
  .id-title { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:24px; font-weight:500; }
  .fields-col { display:flex; flex-direction:column; gap:18px; margin-bottom:32px; }
  label.field { display:flex; flex-direction:column; gap:7px; }
  label.field span { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:500; }
  label.field select {
    background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text);
    transition:border-color .2s; outline:none;
  }
  label.field select option { background:var(--surface); color:var(--text); }
  label.field select:focus { border-color:var(--accent); }

  /* QUESTION */
  .q-number { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; font-weight:500; }
  .q-text { font-family:'Playfair Display',serif; font-size:clamp(17px,3vw,22px); font-weight:700; line-height:1.35; color:#fff; margin-bottom:8px; }
  .q-sub { font-size:12px; color:var(--muted); margin-bottom:24px; line-height:1.5; }

  /* SINGLE OPTIONS */
  .options { display:flex; flex-direction:column; gap:10px; }
  .option {
    display:flex; align-items:flex-start; gap:14px; padding:16px 18px;
    border:1px solid var(--border); border-radius:12px; cursor:pointer;
    transition:all .2s; background:transparent; position:relative; overflow:hidden;
  }
  .option::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,rgba(244,137,65,.07),rgba(165,13,0,.07)); opacity:0; transition:opacity .2s; }
  .option:hover { border-color:rgba(244,137,65,.5); }
  .option:hover::before { opacity:1; }
  .option.selected { border-color:var(--accent); background:rgba(244,137,65,.08); }
  .option.selected::before { opacity:1; }
  .opt-letter {
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--muted);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:600; color:var(--muted);
    flex-shrink:0; margin-top:1px; transition:all .2s; position:relative; z-index:1;
  }
  .option.selected .opt-letter { border-color:var(--accent); background:var(--accent); color:#0a0608; }
  .opt-text { font-size:13.5px; line-height:1.55; color:var(--text); position:relative; z-index:1; }

  /* MULTI OPTIONS */
  .multi-options { display:flex; flex-direction:column; gap:10px; }
  .multi-option {
    display:flex; align-items:flex-start; gap:14px; padding:14px 18px;
    border:1px solid var(--border); border-radius:12px; cursor:pointer;
    transition:all .2s; background:transparent; position:relative; overflow:hidden;
  }
  .multi-option::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,rgba(244,137,65,.07),rgba(165,13,0,.07)); opacity:0; transition:opacity .2s; }
  .multi-option:hover { border-color:rgba(244,137,65,.4); }
  .multi-option:hover::before { opacity:1; }
  .multi-option.selected { border-color:var(--accent); background:rgba(244,137,65,.08); }
  .multi-option.selected::before { opacity:1; }
  .opt-check {
    width:20px; height:20px; border-radius:4px; border:1.5px solid var(--muted);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-top:2px; transition:all .2s; position:relative; z-index:1;
  }
  .multi-option.selected .opt-check { border-color:var(--accent); background:var(--accent); }
  .opt-check-inner { font-size:12px; color:#0a0608; opacity:0; transition:opacity .2s; font-weight:700; }
  .multi-option.selected .opt-check-inner { opacity:1; }

  /* PRIORITY TOPICS */
  .priority-options { display:flex; flex-direction:column; gap:10px; }
  .priority-option {
    display:flex; align-items:center; gap:14px; padding:16px 20px;
    border:1px solid var(--border); border-radius:12px; cursor:pointer;
    transition:all .22s; background:transparent; position:relative; overflow:hidden; user-select:none;
  }
  .priority-option::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,rgba(244,137,65,.07),rgba(165,13,0,.07)); opacity:0; transition:opacity .22s; }
  .priority-option:hover { border-color:rgba(244,137,65,.4); }
  .priority-option:hover::before { opacity:1; }
  .priority-option.rank-1 { border-color:var(--accent); background:rgba(244,137,65,.10); }
  .priority-option.rank-2 { border-color:var(--accent2); background:rgba(165,13,0,.10); }
  .priority-option.rank-3 { border-color:#7a3000; background:rgba(120,48,0,.10); }
  .priority-option.rank-1::before,.priority-option.rank-2::before,.priority-option.rank-3::before { opacity:1; }
  .rank-badge {
    width:28px; height:28px; border-radius:50%; border:1.5px solid var(--muted);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:var(--muted);
    flex-shrink:0; transition:all .2s; position:relative; z-index:1;
    font-family:'Playfair Display',serif;
  }
  .priority-option.rank-1 .rank-badge { border-color:var(--accent); background:var(--accent); color:#0a0608; }
  .priority-option.rank-2 .rank-badge { border-color:var(--accent2); background:var(--accent2); color:#fff; }
  .priority-option.rank-3 .rank-badge { border-color:#c05010; background:#7a3000; color:#ffd0a0; }
  .priority-text { font-size:14px; line-height:1.5; color:var(--text); position:relative; z-index:1; flex:1; }
  .rank-legend { display:flex; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
  .rank-legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .rank-dot { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; font-family:'Playfair Display',serif; }
  .rank-dot.r1 { background:var(--accent); color:#0a0608; }
  .rank-dot.r2 { background:var(--accent2); color:#fff; }
  .rank-dot.r3 { background:#7a3000; color:#ffd0a0; }

  /* BUTTONS */
  .btn-row { display:flex; justify-content:space-between; align-items:center; margin-top:28px; }
  .btn { padding:12px 28px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; letter-spacing:.03em; transition:all .2s; border:none; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 4px 24px rgba(244,137,65,.25); }
  .btn-primary:disabled { opacity:.3; cursor:default; box-shadow:none; }
  .btn-primary:not(:disabled):hover { transform:translateY(-1px); box-shadow:0 6px 30px rgba(244,137,65,.35); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

  /* RESULT */
  #result-screen { display:none; animation:fadeUp .7s ease both; }
  .result-badge { display:inline-block; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); border:1px solid rgba(244,137,65,.35); padding:5px 14px; border-radius:100px; margin-bottom:20px; font-weight:500; }
  .result-title { font-family:'Playfair Display',serif; font-size:clamp(24px,4vw,36px); font-weight:900; color:#fff; margin-bottom:8px; line-height:1.15; }
  .result-subtitle { font-size:13px; color:var(--accent); font-style:italic; margin-bottom:22px; font-weight:300; }
  .result-desc { font-size:15px; line-height:1.7; color:#c8ada8; margin-bottom:26px; }
  .pills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:26px; }
  .pill { font-size:12px; padding:5px 14px; border-radius:100px; font-weight:500; }
  .pill.orange { background:rgba(244,137,65,.12); color:var(--accent); border:1px solid rgba(244,137,65,.25); }
  .pill.red    { background:rgba(165,13,0,.15); color:#ff6b5b; border:1px solid rgba(165,13,0,.3); }
  .pill.warm   { background:rgba(245,200,66,.10); color:var(--gold); border:1px solid rgba(245,200,66,.2); }
  .dims-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:26px; }
  @media(max-width:480px){ .dims-row { grid-template-columns:repeat(2,1fr); } }
  .dim-box { background:rgba(255,255,255,.025); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
  .dim-label { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:6px; }
  .dim-val { font-size:19px; font-weight:700; font-family:'Playfair Display',serif; }
  .dim-val.high { color:var(--accent); }
  .dim-val.mid  { color:#ff8c6b; }
  .dim-val.low  { color:#f87171; }
  .priorities-result { background:rgba(244,137,65,.05); border:1px solid rgba(244,137,65,.2); border-radius:14px; padding:22px; margin-bottom:26px; }
  .priorities-result h3 { font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; font-weight:500; }
  .priority-list { display:flex; flex-direction:column; gap:10px; }
  .priority-item { display:flex; align-items:center; gap:12px; font-size:13.5px; color:#c8ada8; }
  .priority-item .p-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; font-family:'Playfair Display',serif; }
  .priority-item:nth-child(1) .p-num { background:var(--accent); color:#0a0608; }
  .priority-item:nth-child(2) .p-num { background:var(--accent2); color:#fff; }
  .priority-item:nth-child(3) .p-num { background:#7a3000; color:#ffd0a0; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @media(max-width:500px){ .card{padding:28px 18px} }
</style>
</head>
<body>
<div class="shell">

  <div id="survey-screen">
    <div class="header" id="main-header">
      <div class="hero-img-wrap"><img src="hero.png" alt=""></div>
      <div class="eyebrow">Diagnóstico Estratégico</div>
      <h1>¿Qué arquetipo de<br><span>innovación</span> es tu hospital?</h1>
      <p>Encuesta de diagnóstico · Resultado inmediato</p>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Identificación</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="card" id="id-card">
      <div class="id-title">Antes de comenzar</div>
      <div class="fields-col">
        <label class="field">
          <span>Hospital / Centro</span>
          <select id="f-hospital">
            <option value="">Selecciona tu hospital...</option>
            <option>Hospital Univ. Virgen Macarena</option>
            <option>Hospital Univ. Vall d'Hebron</option>
            <option>Hospital Univ. Virgen del Rocío</option>
            <option>Hospital Univ. y Politécnico La Fe</option>
            <option>Hospital Univ. La Paz</option>
            <option>Hospital Univ. De Santiago de Compostela</option>
            <option>Hospital Sant Joan de Deu</option>
            <option>Hospital Clínic de Barcelona</option>
            <option>Hospital General Univ. Dr. Balmis</option>
            <option>Hospital Clínico San Carlos</option>
            <option>Hospital Son Espases</option>
            <option>Clínica Universidad de Navarra</option>
            <option>Hospital de la Santa Creu i Sant Pau</option>
            <option>Hospital Univ. La Princesa</option>
            <option>Hospital Universitario 12 de Octubre</option>
            <option>Hospital Virgen del Rocío</option>
          </select>
        </label>
      </div>
      <div class="btn-row"><div></div><button class="btn btn-primary" onclick="startSurvey()">Comenzar →</button></div>
    </div>
    <div id="q-area"></div>
  </div>

  <div id="result-screen">
    <div class="card">
      <div class="result-badge">Tu arquetipo de innovación</div>
      <div class="result-title" id="res-title"></div>
      <div class="result-subtitle" id="res-subtitle"></div>
      <div class="result-desc" id="res-desc"></div>
      <div class="pills" id="res-pills"></div>
      <div class="dims-row" id="res-dims"></div>
      <div class="priorities-result" id="res-priorities" style="display:none">
        <h3>Tus temáticas prioritarias para grupos de trabajo</h3>
        <div class="priority-list" id="res-priority-list"></div>
      </div>
      <button class="btn btn-ghost" onclick="resetSurvey()">← Volver a empezar</button>
    </div>
  </div>

</div>
<script>
// ─── ARCHETYPES ───────────────────────────────────────────────────────────
// Scores index: [Laboratorio, Hub, Explorador, Plataforma, Reactivo]
const ARCHETYPES = [
  {
    name:"El Hospital Laboratorio", tagline:'"Innovamos principalmente desde dentro"',
    desc:"Tu hospital ha apostado por internalizar la innovación como capacidad propia. Tienes estructura, mandato y visión, y prefieres controlar el proceso antes que depender de actores externos. Generas innovaciones sólidas e incrementales, con rigor metodológico y alta identidad institucional.",
    tags:[{label:"Dirección propia",type:"orange"},{label:"Alta autonomía",type:"orange"},{label:"Innovación incremental",type:"red"},{label:"Control del proceso",type:"red"}],
    dims:[{label:"Estructura",value:"Alta",cls:"high"},{label:"Ecosistema",value:"Media",cls:"mid"},{label:"Velocidad",value:"Media",cls:"mid"}]
  },
  {
    name:"El Hospital Hub", tagline:'"Somos el centro del ecosistema"',
    desc:"Tu hospital actúa como nodo estratégico de un ecosistema de innovación en salud. Atraes, validas y escalas soluciones de terceros, y tu nombre es sinónimo de credibilidad para startups e inversores. El director de innovación es un orquestador, no solo un gestor interno.",
    tags:[{label:"Ecosistema activo",type:"orange"},{label:"Co-creación",type:"orange"},{label:"Innovación disruptiva",type:"red"},{label:"Alto volumen",type:"warm"}],
    dims:[{label:"Estructura",value:"Alta",cls:"high"},{label:"Ecosistema",value:"Muy alta",cls:"high"},{label:"Velocidad",value:"Alta",cls:"high"}]
  },
  {
    name:"El Hospital Explorador", tagline:'"Innovamos por proyectos, cuando surge la oportunidad"',
    desc:"Tienes talento clínico con inquietud innovadora y capacidad de respuesta ágil ante oportunidades concretas. La innovación existe, pero depende de personas clave y financiación externa. El reto es transformar esa energía en capacidad institucional sostenible.",
    tags:[{label:"Clínico emprendedor",type:"orange"},{label:"Agilidad táctica",type:"red"},{label:"Proyectos ad hoc",type:"warm"},{label:"Sin estructura formal",type:"warm"}],
    dims:[{label:"Estructura",value:"Baja",cls:"low"},{label:"Ecosistema",value:"Puntual",cls:"mid"},{label:"Velocidad",value:"Variable",cls:"mid"}]
  },
  {
    name:"El Hospital Plataforma", tagline:'"La innovación es el modelo de negocio"',
    desc:"En tu hospital la innovación y la operación son la misma cosa. Tu arquitectura digital abierta te permite incorporar soluciones de terceros con mínima fricción. Eres un entorno de experimentación continua y un referente en salud digital.",
    tags:[{label:"Digital-first",type:"orange"},{label:"Interoperabilidad",type:"orange"},{label:"Innovación continua",type:"red"},{label:"Alianzas tecnológicas",type:"red"}],
    dims:[{label:"Estructura",value:"Integrada",cls:"high"},{label:"Ecosistema",value:"Sistémica",cls:"high"},{label:"Velocidad",value:"Muy alta",cls:"high"}]
  },
  {
    name:"El Hospital Reactivo", tagline:'"La innovación responde más que lidera"',
    desc:"La innovación en tu organización es principalmente reactiva: llega impulsada por requerimientos normativos o por la adopción de iniciativas probadas en otros centros. No se trata de una falta de capacidad, sino de un enfoque comprensible en entornos altamente regulados. El potencial de transformación es enorme con los pasos adecuados.",
    tags:[{label:"Adopción tardía",type:"warm"},{label:"Sin estructura propia",type:"warm"},{label:"Alto potencial",type:"red"}],
    dims:[{label:"Estructura",value:"Baja",cls:"low"},{label:"Ecosistema",value:"Baja",cls:"low"},{label:"Velocidad",value:"Baja",cls:"low"}]
  }
];

const TOPICS = [
  "VBHC: PROMs y PREMs",
  "Modelos de adopción de la IA",
  "VBHC: Atención descentralizada",
  "Ecosistemas de innovación"
];

// ─── QUESTION DEFINITIONS ─────────────────────────────────────────────────
// type: 'single' | 'multi' | 'topics'
// showIf: function(answers) → bool (undefined = always show)
// scores: array [Lab, Hub, Exp, Plat, React] per option (single) or per item (multi, normalized)
// scoring: single adds scores[selectedIndex], multi adds sum of selected / numSelected * weight

const QUESTIONS = [
  // P1 — estructura
  {
    id:'p1', label:'Pregunta 1', type:'single',
    text:'¿Cómo está estructurada la función de innovación en tu hospital?',
    options:[
      {text:'Tenemos una Dirección de Innovación con equipo dedicado.', scores:[4,2,0,1,0]},
      {text:'La innovación recae en clínicos o equipos motivados, sin estructura formal.', scores:[0,0,4,0,1]},
      {text:'Existe un área transversal de coordinación de innovación, conectada al ecosistema externo.', scores:[1,4,0,2,0]},
      {text:'No existe una función de innovación definida como tal.', scores:[0,0,0,0,5]},
    ]
  },
  // P1b — reporting (solo si P1 ≠ D)
  {
    id:'p1b', label:'Pregunta 1b', type:'single',
    showIf: a => a.p1 !== undefined && a.p1 !== 3,
    text:'¿A quién reporta la función de innovación?',
    sub:'Solo informativo — no afecta al cálculo del arquetipo.',
    options:[
      {text:'A Gerencia / Dirección General', scores:[2,2,1,2,0]},
      {text:'A una Dirección asistencial o médica', scores:[2,0,2,1,0]},
      {text:'A una Dirección de Operaciones o Sistemas', scores:[1,1,0,3,0]},
      {text:'No reporta formalmente a ninguna dirección', scores:[0,0,2,0,2]},
    ]
  },
  // P1c — comité (solo si P1 ≠ D)
  {
    id:'p1c', label:'Pregunta 1c', type:'single',
    showIf: a => a.p1 !== undefined && a.p1 !== 3,
    text:'¿Existe un comité o espacio de gobernanza de innovación?',
    options:[
      {text:'Sí, con reuniones periódicas y participación de dirección.', scores:[3,3,0,2,0]},
      {text:'Sí, pero se reúne de forma irregular.', scores:[1,1,2,1,0]},
      {text:'No existe formalmente.', scores:[0,0,2,0,3]},
    ]
  },
  // P1d — perfiles equipo (solo si P1 ≠ D)
  {
    id:'p1d', label:'Pregunta 1d', type:'multi',
    showIf: a => a.p1 !== undefined && a.p1 !== 3,
    text:'¿Qué perfiles forman parte del equipo o función de innovación?',
    sub:'Selecciona todos los que apliquen.',
    items:[
      {text:'Innovation Manager / Responsable de Innovación', scores:[3,2,0,1,0]},
      {text:'Data Scientist / Analista de datos', scores:[1,1,0,4,0]},
      {text:'Project Manager', scores:[3,2,1,2,0]},
      {text:'Ingeniero de procesos / Lean', scores:[2,1,0,3,0]},
      {text:'Perfiles clínicos con dedicación parcial', scores:[2,1,3,1,0]},
      {text:'No hay perfiles específicos asignados', scores:[0,0,2,0,3]},

// ─── STATE ────────────────────────────────────────────────────────────────
let answers = {};        // { qId: index (single) | [indices] (multi) }
let topicPriorities = [];
let userData = {};
let visibleFlow = [];    // ordered list of question ids shown to this user
let currentFlowIdx = 0;

function buildFlow() {
  visibleFlow = QUESTIONS
    .filter(q => !q.showIf || q.showIf(answers))
    .map(q => q.id);
}

function getQ(id) { return QUESTIONS.find(q => q.id === id); }

// ─── START ────────────────────────────────────────────────────────────────
function startSurvey() {
  const hospital = document.getElementById('f-hospital').value;
  if (!hospital) { alert('Por favor, selecciona tu hospital antes de continuar.'); return; }
  userData = { hospital };
  document.getElementById('id-card').style.display = 'none';
  document.getElementById('main-header').style.display = 'none';
  answers = {}; topicPriorities = []; currentFlowIdx = 0;
  buildFlow();
  renderCurrent();
}

// ─── PROGRESS ────────────────────────────────────────────────────────────
function updateProgress() {
  const total = visibleFlow.length;
  const pct = Math.round((currentFlowIdx / total) * 100);
  const qId = visibleFlow[currentFlowIdx];
  const q = getQ(qId);
  document.getElementById('prog-label').textContent = q ? q.label : '';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderCurrent() {
  buildFlow(); // recalculate in case prev answers changed conditionals
  // ensure currentFlowIdx is in bounds
  if (currentFlowIdx >= visibleFlow.length) { submitSurvey(); return; }
  const qId = visibleFlow[currentFlowIdx];
  const q = getQ(qId);
  updateProgress();
  if (q.type === 'topics') { renderTopics(q); return; }
  if (q.type === 'multi')  { renderMulti(q); return; }
  renderSingle(q);
}

function renderSingle(q) {
  const letters = ['A','B','C','D','E'];
  const cur = answers[q.id];
  const isLast = currentFlowIdx === visibleFlow.length - 1;
  document.getElementById('q-area').innerHTML = `
    <div class="card">
      <div class="q-number">${q.label}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      <div class="options">
        ${q.options.map((o,i) => `
          <div class="option ${cur===i?'selected':''}" onclick="selectSingle('${q.id}',${i})">
            <div class="opt-letter">${letters[i]}</div>
            <div class="opt-text">${o.text}</div>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="prevQ()">← Atrás</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextQ()" ${cur===undefined?'disabled':''}>
          ${isLast ? 'Ver mi arquetipo →' : 'Siguiente →'}
        </button>
      </div>
    </div>`;
}

function renderMulti(q) {
  const cur = answers[q.id] || [];
  const isLast = currentFlowIdx === visibleFlow.length - 1;
  document.getElementById('q-area').innerHTML = `
    <div class="card">
      <div class="q-number">${q.label}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      <div class="multi-options">
        ${q.items.map((item,i) => `
          <div class="multi-option ${cur.includes(i)?'selected':''}" onclick="toggleMulti('${q.id}',${i})">
            <div class="opt-check"><div class="opt-check-inner">✓</div></div>
            <div class="opt-text">${item.text}</div>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="prevQ()">← Atrás</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextQ()" ${cur.length===0?'disabled':''}>
          ${isLast ? 'Ver mi arquetipo →' : 'Siguiente →'}
        </button>
      </div>
    </div>`;
}

function renderTopics(q) {
  document.getElementById('q-area').innerHTML = `
    <div class="card">
      <div class="q-number">${q.label}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub}</div>
      <div class="rank-legend">
        <div class="rank-legend-item"><div class="rank-dot r1">1</div> Primera prioridad</div>
        <div class="rank-legend-item"><div class="rank-dot r2">2</div> Segunda prioridad</div>
        <div class="rank-legend-item"><div class="rank-dot r3">3</div> Tercera prioridad</div>
      </div>
      <div class="priority-options">
        ${TOPICS.map((t,i) => {
          const rank = topicPriorities.indexOf(i);
          const cls = rank===0?'rank-1':rank===1?'rank-2':rank===2?'rank-3':'';
          const lbl = rank>=0 ? rank+1 : '';
          return `<div class="priority-option ${cls}" onclick="toggleTopic(${i})">
            <div class="rank-badge">${lbl}</div>
            <div class="priority-text">${t}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="prevQ()">← Atrás</button>
        <button class="btn btn-primary" onclick="submitSurvey()" ${topicPriorities.length===0?'disabled':''}>
          Ver mi arquetipo →
        </button>
      </div>
    </div>`;
}

// ─── INTERACTION ──────────────────────────────────────────────────────────
function selectSingle(qId, i) {
  answers[qId] = i;
  buildFlow(); // conditional flow may change
  renderCurrent();
}

function toggleMulti(qId, i) {
  if (!answers[qId]) answers[qId] = [];
  const idx = answers[qId].indexOf(i);
  if (idx >= 0) answers[qId].splice(idx, 1);
  else answers[qId].push(i);
  renderCurrent();
}

function toggleTopic(i) {
  const idx = topicPriorities.indexOf(i);
  if (idx >= 0) topicPriorities.splice(idx, 1);
  else if (topicPriorities.length < 3) topicPriorities.push(i);
  renderTopics(getQ('p8'));
}

function nextQ() {
  currentFlowIdx++;
  buildFlow();
  renderCurrent();
}

function prevQ() {
  if (currentFlowIdx === 0) {
    document.getElementById('id-card').style.display = 'block';
    document.getElementById('main-header').style.display = 'block';
    document.getElementById('q-area').innerHTML = '';
    document.getElementById('prog-label').textContent = 'Identificación';
    document.getElementById('prog-pct').textContent = '0%';
    document.getElementById('prog-fill').style.width = '0%';
  } else {
    currentFlowIdx--;
    buildFlow();
    renderCurrent();
  }
}

// ─── SCORING ──────────────────────────────────────────────────────────────
function computeScores() {
  const totals = [0,0,0,0,0];

  QUESTIONS.forEach(q => {
    if (q.type === 'topics') return;
    if (q.showIf && !q.showIf(answers)) return;
    if (q.type === 'single') {
      const sel = answers[q.id];
      if (sel !== undefined) q.options[sel].scores.forEach((v,j) => totals[j] += v);
    } else if (q.type === 'multi') {
      const sel = answers[q.id] || [];
      if (sel.length === 0) return;
      // sum selected scores, normalize by number selected to avoid multi penalizing
      const raw = [0,0,0,0,0];
      sel.forEach(i => q.items[i].scores.forEach((v,j) => raw[j] += v));
      const factor = 1 / sel.length;
      raw.forEach((v,j) => totals[j] += v * factor);
    }
  });
  return totals;
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────
function submitSurvey() {
  const scores = computeScores();
  const maxIdx = scores.indexOf(Math.max(...scores));
  const arch = ARCHETYPES[maxIdx];
  const fecha = new Date().toLocaleString('es-ES');
  const topicsStr = topicPriorities.map((i,r) => `${r+1}º: ${TOPICS[i]}`).join(' | ');

  // Build flat payload for Sheets
  const payload = {
    fecha, hospital: userData.hospital, archetype: arch.name,
    p1: answers.p1!==undefined ? ['A','B','C','D'][answers.p1] : '-',
    p1b: answers.p1b!==undefined ? ['A','B','C','D'][answers.p1b] : '-',
    p1c: answers.p1c!==undefined ? ['A','B','C'][answers.p1c] : '-',
    p1d: answers.p1d ? answers.p1d.map(i=>'ABCDEF'[i]).join('+') : '-',
    p2: answers.p2!==undefined ? ['A','B','C','D'][answers.p2] : '-',
    p3: answers.p3!==undefined ? ['A','B','C'][answers.p3] : '-',
    p3b: answers.p3b ? answers.p3b.map(i=>'ABCDE'[i]).join('+') : '-',
    p4: answers.p4!==undefined ? ['A','B','C','D'][answers.p4] : '-',
    p4b: answers.p4b!==undefined ? ['A','B','C','D'][answers.p4b] : '-',
    p4c: answers.p4c!==undefined ? ['A','B','C','D'][answers.p4c] : '-',
    p5: answers.p5!==undefined ? ['A','B','C','D'][answers.p5] : '-',
    p6: answers.p6 ? answers.p6.map(i=>'ABCDE'[i]).join('+') : '-',
    p6b: answers.p6b!==undefined ? ['A','B','C','D'][answers.p6b] : '-',
    p7: answers.p7!==undefined ? ['A','B','C','D'][answers.p7] : '-',
    tematicas: topicsStr
  };

  fetch('https://script.google.com/macros/s/AKfycbwEf7GzHOu-42IUVvZcFw0mtFM6JLszeGlW9rVlJsM2VJOuLxBAYE5dBKm4RznY0V7jHg/exec', {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).catch(()=>{});

  showResult(arch);
}

// ─── RESULT ───────────────────────────────────────────────────────────────
function showResult(arch) {
  document.getElementById('survey-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('res-title').textContent = arch.name;
  document.getElementById('res-subtitle').textContent = arch.tagline;
  document.getElementById('res-desc').textContent = arch.desc;
  document.getElementById('res-pills').innerHTML = arch.tags.map(t=>`<span class="pill ${t.type}">${t.label}</span>`).join('');
  document.getElementById('res-dims').innerHTML = arch.dims.map(d=>`<div class="dim-box"><div class="dim-label">${d.label}</div><div class="dim-val ${d.cls}">${d.value}</div></div>`).join('');
  if (topicPriorities.length > 0) {
    document.getElementById('res-priorities').style.display = 'block';
    document.getElementById('res-priority-list').innerHTML = topicPriorities.map((i,r)=>`
      <div class="priority-item"><div class="p-num">${r+1}</div><span>${TOPICS[i]}</span></div>`).join('');
  }
}

// ─── RESET ────────────────────────────────────────────────────────────────
function resetSurvey() {
  answers = {}; topicPriorities = []; userData = {}; currentFlowIdx = 0; visibleFlow = [];
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('survey-screen').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('main-header').style.display = 'block';
  document.getElementById('id-card').style.display = 'block';
  document.getElementById('q-area').innerHTML = '';
  document.getElementById('f-hospital').value = '';
  document.getElementById('prog-label').textContent = 'Identificación';
  document.getElementById('prog-pct').textContent = '0%';
  document.getElementById('prog-fill').style.width = '0%';
}
