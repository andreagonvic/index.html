<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquetipo de Innovación Hospitalaria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0608;
    --surface: #130a0b;
    --border: #2d1518;
    --accent: #F48941;
    --accent2: #A50D00;
    --accent3: #480003;
    --text: #f0e8e6;
    --muted: #8a6f6a;
    --gold: #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(244,137,65,0.06) 0%, transparent 65%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(165,13,0,0.07) 0%, transparent 65%);
    pointer-events: none;
  }

  .shell {
    width: 100%;
    max-width: 720px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.7s ease both;
  }
  .hero-img-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: -8px;
  }
  .hero-img-wrap img {
    width: 210px;
    height: 210px;
    object-fit: contain;
    mix-blend-mode: screen;
    filter: saturate(1.1) brightness(1.05);
    pointer-events: none;
    user-select: none;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 900;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 16px;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.65;
    max-width: 480px;
    margin: 0 auto;
  }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 36px; animation: fadeUp 0.7s 0.1s ease both; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em;
  }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    animation: fadeUp 0.6s 0.15s ease both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0.7;
  }

  /* ID FIELDS */
  .id-title {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 24px; font-weight: 500;
  }
  .fields-col { display: flex; flex-direction: column; gap: 18px; margin-bottom: 32px; }
  label.field { display: flex; flex-direction: column; gap: 7px; }
  label.field span {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }
  label.field input, label.field select {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text); transition: border-color .2s; outline: none;
  }
  label.field input::placeholder { color: var(--muted); }
  label.field select option { background: var(--surface); color: var(--text); }
  label.field input:focus, label.field select:focus { border-color: var(--accent); }

  /* QUESTION */
  .q-number {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px; font-weight: 500;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3vw, 24px); font-weight: 700;
    line-height: 1.35; color: #fff; margin-bottom: 10px;
  }
  .q-sub {
    font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5;
  }

  /* STANDARD OPTIONS */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 18px 20px; border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.22s ease;
    background: transparent; position: relative; overflow: hidden;
  }
  .option::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, rgba(244,137,65,0.07), rgba(165,13,0,0.07));
    opacity: 0; transition: opacity 0.22s;
  }
  .option:hover { border-color: rgba(244,137,65,0.5); }
  .option:hover::before { opacity: 1; }
  .option.selected { border-color: var(--accent); background: rgba(244,137,65,0.08); }
  .option.selected::before { opacity: 1; }
  .opt-letter {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: var(--muted);
    flex-shrink: 0; margin-top: 1px; transition: all 0.2s; position: relative; z-index: 1;
  }
  .option.selected .opt-letter { border-color: var(--accent); background: var(--accent); color: #0a0608; }
  .opt-text { font-size: 14px; line-height: 1.55; color: var(--text); position: relative; z-index: 1; }

  /* PRIORITY OPTIONS */
  .priority-options { display: flex; flex-direction: column; gap: 10px; }
  .priority-option {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.22s ease;
    background: transparent; position: relative; overflow: hidden; user-select: none;
  }
  .priority-option::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, rgba(244,137,65,0.07), rgba(165,13,0,0.07));
    opacity: 0; transition: opacity 0.22s;
  }
  .priority-option:hover { border-color: rgba(244,137,65,0.4); }
  .priority-option:hover::before { opacity: 1; }
  .priority-option.rank-1 { border-color: var(--accent); background: rgba(244,137,65,0.10); }
  .priority-option.rank-2 { border-color: var(--accent2); background: rgba(165,13,0,0.10); }
  .priority-option.rank-3 { border-color: #7a3000; background: rgba(120,48,0,0.10); }
  .priority-option.rank-1::before, .priority-option.rank-2::before, .priority-option.rank-3::before { opacity: 1; }

  .rank-badge {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--muted);
    flex-shrink: 0; transition: all 0.2s; position: relative; z-index: 1;
    font-family: 'Playfair Display', serif;
  }
  .priority-option.rank-1 .rank-badge { border-color: var(--accent); background: var(--accent); color: #0a0608; }
  .priority-option.rank-2 .rank-badge { border-color: var(--accent2); background: var(--accent2); color: #fff; }
  .priority-option.rank-3 .rank-badge { border-color: #c05010; background: #7a3000; color: #ffd0a0; }

  .priority-text { font-size: 14px; line-height: 1.5; color: var(--text); position: relative; z-index: 1; flex: 1; }

  .rank-legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .rank-legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); letter-spacing: 0.04em;
  }
  .rank-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; font-family: 'Playfair Display', serif;
  }
  .rank-dot.r1 { background: var(--accent); color: #0a0608; }
  .rank-dot.r2 { background: var(--accent2); color: #fff; }
  .rank-dot.r3 { background: #7a3000; color: #ffd0a0; }

  /* BUTTONS */
  .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }
  .btn {
    padding: 13px 32px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.03em;
    transition: all 0.2s; border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; box-shadow: 0 4px 24px rgba(244,137,65,0.25);
  }
  .btn-primary:disabled { opacity: 0.3; cursor: default; box-shadow: none; }
  .btn-primary:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 6px 30px rgba(244,137,65,0.35); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* RESULT */
  #result-screen { display: none; animation: fadeUp 0.7s ease both; }
  .result-badge {
    display: inline-block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); border: 1px solid rgba(244,137,65,0.35);
    padding: 5px 14px; border-radius: 100px; margin-bottom: 20px; font-weight: 500;
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 4vw, 38px); font-weight: 900; color: #fff; margin-bottom: 8px; line-height: 1.15;
  }
  .result-subtitle { font-size: 13px; color: var(--accent); font-style: italic; margin-bottom: 24px; font-weight: 300; }
  .result-desc { font-size: 15px; line-height: 1.7; color: #c8ada8; margin-bottom: 28px; }

  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .pill { font-size: 12px; padding: 5px 14px; border-radius: 100px; font-weight: 500; }
  .pill.orange { background: rgba(244,137,65,0.12); color: var(--accent); border: 1px solid rgba(244,137,65,0.25); }
  .pill.red    { background: rgba(165,13,0,0.15); color: #ff6b5b; border: 1px solid rgba(165,13,0,0.3); }
  .pill.warm   { background: rgba(245,200,66,0.10); color: var(--gold); border: 1px solid rgba(245,200,66,0.2); }

  .dims-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 28px; }
  @media(max-width:480px){ .dims-row { grid-template-columns: repeat(2,1fr); } }
  .dim-box {
    background: rgba(255,255,255,0.025); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; text-align: center;
  }
  .dim-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  .dim-val { font-size: 20px; font-weight: 700; font-family: 'Playfair Display', serif; }
  .dim-val.high { color: var(--accent); }
  .dim-val.mid  { color: #ff8c6b; }
  .dim-val.low  { color: #f87171; }

  .priorities-result {
    background: rgba(244,137,65,0.05); border: 1px solid rgba(244,137,65,0.2);
    border-radius: 14px; padding: 24px; margin-bottom: 28px;
  }
  .priorities-result h3 {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px; font-weight: 500;
  }
  .priority-list { display: flex; flex-direction: column; gap: 10px; }
  .priority-item {
    display: flex; align-items: center; gap: 12px;
    font-size: 13.5px; color: #c8ada8;
  }
  .priority-item .p-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }
  .priority-item:nth-child(1) .p-num { background: var(--accent); color: #0a0608; }
  .priority-item:nth-child(2) .p-num { background: var(--accent2); color: #fff; }
  .priority-item:nth-child(3) .p-num { background: #7a3000; color: #ffd0a0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media(max-width:500px){ .card { padding: 28px 20px; } }
</style>
</head>
<body>
<div class="shell">

  <!-- SURVEY SCREEN -->
  <div id="survey-screen">
    <div class="header" id="main-header">
      <div class="hero-img-wrap">
        <img src="hero.png" alt="">
      </div>
      <div class="eyebrow">Diagnóstico Estratégico</div>
      <h1>¿Qué arquetipo de<br><span>innovación</span> es tu hospital?</h1>
      <p>8 preguntas · 4 minutos · Resultado inmediato</p>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Identificación</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <!-- IDENTIFICATION -->
    <div class="card" id="id-card">
      <div class="id-title">Antes de comenzar</div>
      <div class="fields-col">
        <label class="field">
          <span>Hospital / Centro</span>
          <select id="f-hospital">
            <option value="">Selecciona tu hospital...</option>
            <option>Hospital Univ. Virgen Macarena</option>
            <option>Hospital Univ. Vall d'Hebron</option>
            <option>Hospital Univ. Virgen del Rocío</option>
            <option>Hospital Univ. y Politécnico La Fe</option>
            <option>Hospital Univ. La Paz</option>
            <option>Hospital Univ. De Santiago de Compostela</option>
            <option>Hospital Sant Joan de Deu</option>
            <option>Hospital Clínic de Barcelona</option>
            <option>Hospital General Univ. Dr. Balmis</option>
            <option>Hospital Clínico San Carlos</option>
            <option>Hospital Son Espases</option>
            <option>Clínica Univ. de Navarra</option>
            <option>Hospital de la Santa Creu i Sant Pau</option>
            <option>Hospital Univ. La Princesa</option>
            <option>Hospital Univ. 12 de Octubre</option>
            <option>Hospital Virgen del Rocío</option>
          </select>
        </label>
      </div>
      <div class="btn-row"><div></div><button class="btn btn-primary" onclick="startSurvey()">Comenzar →</button></div>
    </div>

    <!-- QUESTIONS -->
    <div id="q-area"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="card">
      <div class="result-badge">Tu arquetipo de innovación</div>
      <div class="result-title" id="res-title"></div>
      <div class="result-subtitle" id="res-subtitle"></div>
      <div class="result-desc" id="res-desc"></div>
      <div class="pills" id="res-pills"></div>
      <div class="dims-row" id="res-dims"></div>
      <div class="priorities-result" id="res-priorities" style="display:none">
        <h3>Tus temáticas prioritarias para grupos de trabajo</h3>
        <div class="priority-list" id="res-priority-list"></div>
      </div>
      <button class="btn btn-ghost" onclick="resetSurvey()">← Volver a empezar</button>
    </div>
  </div>

</div>

<script>
// ─── QUESTIONS ─────────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    text: "¿Cómo está estructurada la función de innovación en tu hospital?",
    options: [
      { text: "Tenemos una Dirección de Innovación con equipo y presupuesto propios.", scores: [3,2,0,1,0] },
      { text: "La innovación recae en clínicos o equipos motivados, sin estructura formal.", scores: [0,0,3,0,1] },
      { text: "Existe un área transversal de innovación, con conexión al ecosistema externo y capacidad de coordinación interna.", scores: [1,3,0,1,0] },
      { text: "No existe una función de innovación definida como tal.", scores: [0,0,0,0,4] },
    ]
  },
  {
    text: "¿Cómo se originan habitualmente las iniciativas innovadoras en tu hospital?",
    options: [
      { text: "Desde dentro: los profesionales detectan una necesidad y la desarrollamos internamente.", scores: [4,1,1,0,0] },
      { text: "Desde fuera: startups y empresas nos proponen soluciones que evaluamos y pilotamos.", scores: [0,3,0,2,1] },
      { text: "Por proyectos puntuales ligados a convocatorias, congresos o colaboraciones coyunturales.", scores: [0,0,4,0,1] },
      { text: "La innovación llega principalmente por presión regulatoria o por imitación de otros centros.", scores: [0,0,0,0,5] },
    ]
  },
  {
    text: "¿Cuál es vuestra relación con el ecosistema de innovación en salud (startups, universidades, fondos…)?",
    options: [
      { text: "Relación proactiva y sistemática: co-creamos, pilotamos y escalamos con actores externos de forma continua.", scores: [0,4,0,3,0] },
      { text: "Relación selectiva: colaboramos puntualmente con externos en proyectos que lideramos o controlamos internamente.", scores: [3,1,1,1,0] },
      { text: "Relación reactiva o casi inexistente: participamos cuando nos lo proponen o no tenemos relación establecida.", scores: [0,0,1,0,4] },
    ]
  },
  {
    text: "Cuando una iniciativa innovadora no funciona como se esperaba, ¿qué ocurre en tu organización?",
    options: [
      { text: "Se analiza en detalle y se aprende, pero generamos fricción interna al asumir el fracaso.", scores: [3,1,0,0,1] },
      { text: "Es parte del proceso: fallamos rápido, aprendemos y pivotamos sin drama.", scores: [0,3,1,3,0] },
      { text: "Suele abandonarse discretamente; hay poca cultura de documentar o aprender del fracaso.", scores: [0,0,3,0,2] },
      { text: "Prácticamente no experimentamos, así que rara vez afrontamos este escenario.", scores: [0,0,0,0,4] },
    ]
  },
  {
    text: "¿Cuál es el principal motor de la innovación en tu hospital?",
    options: [
      { text: "Mejorar la experiencia y los resultados del paciente como eje central.", scores: [2,2,1,0,0] },
      { text: "Empoderar al profesional clínico: innovar para que trabaje mejor, con más autonomía y menos fricción.", scores: [3,0,2,1,0] },
      { text: "Optimizar la operativa y la eficiencia del hospital como organización.", scores: [2,0,0,4,0] },
      { text: "Innovar forma parte de nuestra identidad institucional: lo hacemos porque es parte de lo que somos.", scores: [1,4,0,1,0] },
    ]
  },
  {
    text: "¿Cómo se financia principalmente la innovación en tu hospital?",
    options: [
      { text: "Con presupuesto propio centralizado, asignado específicamente a innovación.", scores: [4,1,0,2,0] },
      { text: "Con presupuesto descentralizado: cada servicio o unidad decide invertir parte del suyo en innovación.", scores: [2,0,2,1,0] },
      { text: "A través de convocatorias externas: fondos europeos, nacionales o regionales.", scores: [0,1,4,0,0] },
      { text: "Mediante alianzas y co-inversión con empresas, startups o universidades compartiendo riesgo y retorno.", scores: [0,4,1,2,0] },
      { text: "No hay financiación específica; se improvisa proyecto a proyecto.", scores: [0,0,1,0,4] },
    ]
  },
  {
    text: "¿Qué perfiles lideran o participan activamente en los proyectos de innovación?",
    options: [
      { text: "Principalmente perfiles de gestión y tecnología (gerencia, IT, dirección).", scores: [3,0,0,3,0] },
      { text: "Clínicos inquietos que innovan por iniciativa propia, sin mandato institucional.", scores: [0,0,4,0,1] },
      { text: "Equipos mixtos clínico-técnicos con roles definidos y metodología compartida.", scores: [3,2,1,2,0] },
      { text: "Un ecosistema amplio: clínicos, gestores, pacientes, externos y startups co-diseñan juntos.", scores: [0,4,0,3,0] },
    ]
  }
];

// ─── WORKING GROUP TOPICS ───────────────────────────────────────────────────
const TOPICS = [
  "VBHC: PROMs y PREMs",
  "Modelos de adopción de la IA",
  "VBHC: Atención descentralizada",
  "Ecosistemas de innovación"
];

// ─── ARCHETYPES ─────────────────────────────────────────────────────────────
const ARCHETYPES = [
  {
    name: "El Hospital Laboratorio",
    tagline: '"Innovamos principalmente desde dentro"',
    desc: "Tu hospital ha apostado por internalizar la innovación como capacidad propia. Tienes estructura, mandato y visión, y prefieres controlar el proceso antes que depender de actores externos. Generas innovaciones sólidas e incrementales, con rigor metodológico y alta identidad institucional.",
    tags: [{label:"CIO propio",type:"orange"},{label:"Alta autonomía",type:"orange"},{label:"Innovación incremental",type:"red"},{label:"Control del proceso",type:"red"}],
    dims: [{label:"Estructura",value:"Alta",cls:"high"},{label:"Ecosistema",value:"Media",cls:"mid"},{label:"Velocidad",value:"Media",cls:"mid"}],
  },
  {
    name: "El Hospital Hub",
    tagline: '"Somos el centro del ecosistema"',
    desc: "Tu hospital actúa como nodo estratégico de un ecosistema de innovación en salud. Atraes, validas y escalas soluciones de terceros, y tu nombre es sinónimo de credibilidad para startups e inversores. El CIO es un orquestador, no solo un gestor interno.",

];

// ─── STATE ──────────────────────────────────────────────────────────────────
const TOTAL_QUESTIONS = QUESTIONS.length + 1; // +1 for topics question
let currentQ = 0;
let answers = Array(QUESTIONS.length).fill(null);
let topicPriorities = [];
let userData = {};

// ─── START ──────────────────────────────────────────────────────────────────
function startSurvey() {
  const hospital = document.getElementById('f-hospital').value;
  if (!hospital) { alert('Por favor, selecciona tu hospital antes de continuar.'); return; }
  userData = { hospital };
  document.getElementById('id-card').style.display = 'none';
  document.getElementById('main-header').style.display = 'none';
  currentQ = 0;
  answers = Array(QUESTIONS.length).fill(null);
  topicPriorities = [];
  renderQuestion();
}

// ─── RENDER QUESTION ────────────────────────────────────────────────────────
function renderQuestion() {
  const pct = Math.round((currentQ / TOTAL_QUESTIONS) * 100);
  document.getElementById('prog-label').textContent = `Pregunta ${currentQ + 1} de ${TOTAL_QUESTIONS}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  if (currentQ < QUESTIONS.length) {
    renderArchetypeQuestion();
  } else {
    renderTopicsQuestion();
  }
}

function renderArchetypeQuestion() {
  const q = QUESTIONS[currentQ];
  const letters = ['A','B','C','D','E'];
  document.getElementById('q-area').innerHTML = `
    <div class="card">
      <div class="q-number">Pregunta ${currentQ + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i) => `
          <div class="option ${answers[currentQ]===i?'selected':''}" onclick="selectOpt(${i})">
            <div class="opt-letter">${letters[i]}</div>
            <div class="opt-text">${o.text}</div>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="prevQ()">← Atrás</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextQ()" ${answers[currentQ]===null?'disabled':''}>
          Siguiente →
        </button>
      </div>
    </div>`;
}

function renderTopicsQuestion() {
  document.getElementById('q-area').innerHTML = `
    <div class="card">
      <div class="q-number">Pregunta ${TOTAL_QUESTIONS} de ${TOTAL_QUESTIONS}</div>
      <div class="q-text">¿Qué temáticas te interesan para los grupos de trabajo?</div>
      <div class="q-sub">Selecciona entre 1 y 3 opciones por orden de prioridad. Haz clic una vez para marcar como primera prioridad, un segundo clic para la segunda, y un tercer clic para la tercera. Haz clic de nuevo sobre una opción para desmarcarla.</div>
      <div class="rank-legend">
        <div class="rank-legend-item"><div class="rank-dot r1">1</div> Primera prioridad</div>
        <div class="rank-legend-item"><div class="rank-dot r2">2</div> Segunda prioridad</div>
        <div class="rank-legend-item"><div class="rank-dot r3">3</div> Tercera prioridad</div>
      </div>
      <div class="priority-options">
        ${TOPICS.map((t,i) => {
          const rank = topicPriorities.indexOf(i);
          const rankClass = rank === 0 ? 'rank-1' : rank === 1 ? 'rank-2' : rank === 2 ? 'rank-3' : '';
          const rankLabel = rank >= 0 ? rank + 1 : '';
          return `
          <div class="priority-option ${rankClass}" id="topic-${i}" onclick="toggleTopic(${i})">
            <div class="rank-badge">${rankLabel}</div>
            <div class="priority-text">${t}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="prevQ()">← Atrás</button>
        <button class="btn btn-primary" id="btn-next-topics" onclick="submitSurvey()" ${topicPriorities.length === 0 ? 'disabled' : ''}>
          Ver mi arquetipo →
        </button>
      </div>
    </div>`;
}

// ─── TOPIC SELECTION ────────────────────────────────────────────────────────
function toggleTopic(i) {
  const idx = topicPriorities.indexOf(i);
  if (idx >= 0) {
    topicPriorities.splice(idx, 1);
  } else if (topicPriorities.length < 3) {
    topicPriorities.push(i);
  }
  renderTopicsQuestion();
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────
function selectOpt(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.option').forEach((el,idx) => el.classList.toggle('selected', idx===i));
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (currentQ < QUESTIONS.length && answers[currentQ] === null) return;
  currentQ++;
  renderQuestion();
}

function prevQ() {
  if (currentQ === 0) {
    document.getElementById('id-card').style.display = 'block';
    document.getElementById('main-header').style.display = 'block';
    document.getElementById('q-area').innerHTML = '';
    document.getElementById('prog-label').textContent = 'Identificación';
    document.getElementById('prog-pct').textContent = '0%';
    document.getElementById('prog-fill').style.width = '0%';
  } else {
    currentQ--;
    renderQuestion();
  }
}

// ─── COMPUTE & SUBMIT ────────────────────────────────────────────────────────
function computeScores() {
  const t = [0,0,0,0,0];
  for (let i = 0; i < QUESTIONS.length; i++) {
    if (answers[i] !== null) QUESTIONS[i].options[answers[i]].scores.forEach((v,j) => t[j] += v);
  }
  return t;
}

function submitSurvey() {
  if (topicPriorities.length === 0) return;
  const scores = computeScores();
  const maxIdx = scores.indexOf(Math.max(...scores));
  const arch = ARCHETYPES[maxIdx];
  const fecha = new Date().toLocaleString('es-ES');
  const topicsStr = topicPriorities.map((i,rank) => `${rank+1}º: ${TOPICS[i]}`).join(' | ');

  fetch('https://script.google.com/macros/s/AKfycbwEf7GzHOu-42IUVvZcFw0mtFM6JLszeGlW9rVlJsM2VJOuLxBAYE5dBKm4RznY0V7jHg/exec', {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      fecha,
      hospital: userData.hospital,
      archetype: arch.name,
      q1: answers[0]!==null ? String.fromCharCode(65+answers[0]) : '-',
      q2: answers[1]!==null ? String.fromCharCode(65+answers[1]) : '-',
      q3: answers[2]!==null ? String.fromCharCode(65+answers[2]) : '-',
      q4: answers[3]!==null ? String.fromCharCode(65+answers[3]) : '-',
      q5: answers[4]!==null ? String.fromCharCode(65+answers[4]) : '-',
      q6: answers[5]!==null ? String.fromCharCode(65+answers[5]) : '-',
      q7: answers[6]!==null ? String.fromCharCode(65+answers[6]) : '-',
      tematicas: topicsStr,
    })
  }).catch(()=>{});

  showResult(arch);
}

// ─── SHOW RESULT ─────────────────────────────────────────────────────────────
function showResult(arch) {
  document.getElementById('survey-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  document.getElementById('res-title').textContent = arch.name;
  document.getElementById('res-subtitle').textContent = arch.tagline;
  document.getElementById('res-desc').textContent = arch.desc;
  document.getElementById('res-pills').innerHTML = arch.tags.map(t=>`<span class="pill ${t.type}">${t.label}</span>`).join('');
  document.getElementById('res-dims').innerHTML = arch.dims.map(d=>`<div class="dim-box"><div class="dim-label">${d.label}</div><div class="dim-val ${d.cls}">${d.value}</div></div>`).join('');

  if (topicPriorities.length > 0) {
    document.getElementById('res-priorities').style.display = 'block';
    document.getElementById('res-priority-list').innerHTML = topicPriorities.map((i,rank) => `
      <div class="priority-item">
        <div class="p-num">${rank+1}</div>
        <span>${TOPICS[i]}</span>
      </div>`).join('');
  }
}

// ─── RESET ───────────────────────────────────────────────────────────────────
function resetSurvey() {
  currentQ = 0; answers = Array(QUESTIONS.length).fill(null); topicPriorities = []; userData = {};
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('survey-screen').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('main-header').style.display = 'block';
  document.getElementById('id-card').style.display = 'block';
  document.getElementById('q-area').innerHTML = '';
  document.getElementById('f-hospital').value = '';
  document.getElementById('prog-label').textContent = 'Identificación';
  document.getElementById('prog-pct').textContent = '0%';
  document.getElementById('prog-fill').style.width = '0%';
}
</script>
</body>
</html>
